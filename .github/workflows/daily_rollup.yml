name: Daily Cost Rollup + Harness Summary

on:
  schedule:
    - cron: "0 11 * * *"   # 6am EST (UTC-5) / 7am EDT (UTC-4) — always runs at 11:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  rollup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic openai requests

      - name: Run daily cost rollup
        run: python daily_cost_rollup.py

      - name: Run harness summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python summarize_harness_runs.py fo_run_log.csv

      - name: Commit and push outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_costs_daily.csv harness_summary_costs.csv harness_summaries/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily rollup $(date -u +%Y-%m-%d)"
            git push
          fi
